<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="left">
            <div id="playbackControl">
                <div id="albumArtWrap">
                    <img id="albumArt" src="https://picsum.photos/200" alt="Album Art">
                    <div id="albumLoadingOverlay">
                        <div class="mini-spinner"></div>
                    </div>
                </div>

                <iframe id="player" title="YouTube player" type="text/html" src="about:blank" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" loading="eager"></iframe>

                <div class="title" id="playbackTitle">TITLE</div>
                <div class="author" id="playbackAuthor">AUTHOR</div>

                <div class="control-timebar">
                    <div id="currentTimeLabel">00:00</div>
                    <input type="range" id="seekControl" min="0" max="100" value="0">
                    <div id="durationLabel">00:00</div>
                </div>

                <div class="control-buttons">
                    <button type="button" onclick="toggleShuffle()" title="Shuffle" class="bx bx-shuffle"></button>
                    <button type="button" onclick="previousTrack()" title="Previous" class="bx bx-skip-previous"></button>
                    <button type="button" onclick="togglePlayPause()" title="Play / Pause" class="bx bx-play" id="playPauseBtn"></button>
                    <button type="button" onclick="nextTrack()" class="bx bx-skip-next" title="Next"></button>
                    <button type="button" onclick="toggleRepeat()" class="bx bx-repeat" title="Repeat"></button>
                </div>

                <div class="volume-row">
                    <div class="bx bx-volume"></div>
                    <input type="range" id="volumeControl" class="form-range w-100" min="0" max="100" value="80">
                    <div class="bx bx-volume-full"></div>
                </div>

                <div id="errorMessage" class="empty-state" style="display:none; width:100%; padding:0; text-align:left;"></div>
            </div>

            <div class="playlist-list" id="playlistList"></div>
        </div>

        <div class="middle" id="playlistView"></div>

        <div class="right">
            <div class="search-box" id="searchBox">
                <div class="search-header">
                    <input id="searchInput" placeholder="Search videos..." />
                    <button type="button" class="search-btn search bx bx-search" onclick="search()" title="Search"></button>
                    <button type="button" class="search-btn clear" onclick="clearSearch()" title="Clear">✕</button>
                </div>
                <div id="loader" class="loader"></div>
                <div id="results"></div>
            </div>
            <div class="lyrics-box" id="lyricsBox">
                <div class="lyrics-header">
                    <div class="lyrics-title" id="lyricsTitle">Lyrics</div>
                    <div class="lyrics-subtitle" id="lyricsSubtitle">Nothing playing</div>
                </div>
                <div class="lyrics-content" id="lyricsContent">
                    <div class="lyrics-empty">Play a song to view lyrics.</div>
                </div>
                <div class="lyrics-loading-overlay" id="lyricsLoadingOverlay">
                    <div class="mini-spinner"></div>
                </div>
            </div>
            <div class="lastfm-box" id="utilityBox">
                <div class="lastfm-bar">
                    <div class="lastfm-status-area">
                        <div class="lastfm-label">Last.fm</div>
                        <div class="lastfm-status" id="lastfmStatus">Scrobbling ready</div>
                        <div class="lastfm-nowplaying" id="lastfmNowPlaying">Set up your Last.fm account in Settings.</div>
                    </div>
                    <div class="lastfm-actions">
                        <button type="button" class="lastfm-toggle bx bx-radio-circle" id="lastfmToggleBtn" onclick="toggleLastFmScrobbling()" title="Toggle scrobbling"></button>
                    </div>
                </div>
                <button type="button" class="utility-settings bx bx-cog" onclick="openSettingsModal()" title="Settings"></button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Add to Playlist</h3>
            <div id="modalPlaylists"></div>
            <input id="newPlaylistName" placeholder="New playlist name">
            <button id="createPlaylistBtn" type="button" onclick="createPlaylist()">Create Playlist</button>
            <button type="button" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content settings-content">
            <h3>Settings</h3>
            <div class="settings-grid">
                <div class="settings-field">
                    <label for="lastfmUsernameInput">Last.fm username</label>
                    <input id="lastfmUsernameInput" type="text" placeholder="Username">
                </div>
                <div class="settings-field">
                    <label for="lastfmPasswordInput">Last.fm password</label>
                    <input id="lastfmPasswordInput" type="password" placeholder="Password">
                </div>
                <div class="settings-field">
                    <label for="lastfmMinListenInput">Minimum listen time to scrobble (seconds)</label>
                    <input id="lastfmMinListenInput" type="number" min="1" step="1" value="15">
                </div>
                <div class="settings-row">
                    <div>
                        <div style="font-weight:700;">Disable scrobbling permanently</div>
                        <small>Use the bar button for temporary toggles.</small>
                    </div>
                    <input id="lastfmPermanentDisableInput" type="checkbox">
                </div>
            </div>
            <div class="settings-actions">
                <button type="button" class="action-left bx bx-save" onclick="saveSettings()" title="Save"></button>
                <button type="button" class="action-right bx bx-x" onclick="closeSettingsModal()" title="Close"></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
