<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
            margin: 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 20%;
            background: #0d0d0d;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            min-width: 220px;
        }

        #playbackControl {
            margin: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            align-items: center;
        }

        #player {
            display: none;
        }

        .album-art-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 250px;
            margin: 0 auto;
        }

        .album-art-container img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 250px;
        }

        .title {
            font-weight: bold;
            word-break: break-word;
        }

        .author {
            color: #aaa;
            font-size: 13px;
        }

        .control-timebar, .volume-row {
            display: flex;
            flex-direction: row;
            width: 100%;
            align-items: center;
            gap: 8px;
        }

        .control-timebar input, .volume-row input {
            width: 100%;
        }

        .control-timebar div, .volume-row div {
            color: #aaa;
            font-size: 13px;
            border-radius: 5px;
            white-space: nowrap;
            padding: 4px;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .control-buttons button {
            width: 100%;
            aspect-ratio: 1/1;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 18px;
        }

        .control-buttons button:hover {
            background: #3a3a3a;
        }

        .control-buttons button.active-toggle {
            background: #4c3f18;
        }

        .control-buttons button.active-toggle:hover {
            background: #5a4b1f;
        }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
            background: #1a1a1a;
            border-radius: 10px;
            margin: 0 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .playlist-row:hover {
            background: #232323;
            border-color: #404040;
        }

        .playlist-row.active {
            background: #272727;
            border-color: #5a5a5a;
        }

        .playlist-item {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playlist-item:hover {
            background: transparent;
            border-color: transparent;
        }

        .playlist-item.active {
            background: transparent;
            border-color: transparent;
        }

        .playlist-item-name {
            min-width: 0;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .playlist-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .playlist-action-btn,
        .drag-handle,
        .playlist-save-btn {
            border: none;
            border-radius: 10px;
            background: #2a2a2a;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .playlist-action-btn:hover,
        .drag-handle:hover,
        .playlist-save-btn:hover {
            background: #3a3a3a;
            transform: translateY(-1px);
        }

        .playlist-save-btn {
            background: #243a24;
        }

        .playlist-save-btn:hover {
            background: #2f4b2f;
        }

        .drag-handle {
            cursor: grab;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .delete-playlist-btn,
        .delete-track-btn {
            border: none;
            border-radius: 10px;
            background: #2a2a2a;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .delete-playlist-btn:hover,
        .delete-track-btn:hover {
            background: #433;
            transform: translateY(-1px);
        }

        .middle {
            width: 40%;
            border-right: 1px solid #222;
            overflow-y: auto;
            text-align: left;
            min-width: 280px;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        .track-cover-btn {
            position: relative;
            width: 54px;
            height: 54px;
            padding: 0;
            border: none;
            background: transparent;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 10px;
        }

        .track-cover-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.25s ease;
        }

        .track-cover-btn .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.25s ease;
            background: rgba(0,0,0,0);
            pointer-events: none;
        }

        .track-cover-btn:hover img {
            filter: brightness(0.55);
        }

        .track-cover-btn:hover .play-overlay {
            opacity: 1;
        }

        .album-art-container {
            position: relative;
        }

        .album-loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .album-art-container.loading .album-loading-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .album-art-container.loading img {
            filter: brightness(0.65) blur(1px);
        }

        .mini-spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #444;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .right {
            width: 40%;
            display: flex;
            flex-direction: column;
            min-width: 320px;
        }

        .lyrics-box {
            flex: 1;
            margin: 0 10px 10px 10px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            position: relative;
        }

        .lyrics-box.loading .lyrics-content {
            opacity: 0.18;
        }

        .lyrics-loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
            z-index: 2;
        }

        .lyrics-box.loading .lyrics-loading-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .lyrics-header {
            padding: 12px 14px;
            border-bottom: 1px solid #252525;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lyrics-title {
            font-weight: 700;
            font-size: 14px;
        }

        .lyrics-subtitle {
            color: #aaa;
            font-size: 12px;
        }

        .lyrics-content {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
            white-space: pre-wrap;
        }

        .lyrics-line {
            color: #9a9a9a;
            padding: 4px 0;
            line-height: 1.45;
            transition: color 0.2s ease, transform 0.2s ease, font-weight 0.2s ease;
            min-height: 1.45em;
            cursor: pointer;
        }

        .lyrics-line.active {
            color: #fff;
            font-weight: 700;
            transform: translateX(4px);
        }

        .lyrics-empty {
            color: #aaa;
            font-size: 14px;
            padding: 2px 0;
        }

        .search-box {
            margin: 10px 10px 12px 10px;
            background: #1a1a1a;
            border-radius: 10px;
            height: 64px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: height 0.5s ease, box-shadow 0.5s ease;
        }

        .search-box.loading {
            height: 128px;
        }

        .search-box.loading .loader {
            height: 40px;
        }

        .search-box.loading .loader::after {
            opacity: 1;
        }

        .search-box.open {
            height: 400px;
        }

        .search-box.open #results {
            opacity: 1;
            transform: translateY(0);
        }

        .search-header {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            padding: 10px;
            z-index: 10;
            display: flex;
        }

        .search-header input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: none;
            outline: none;
            border-radius: 8px 0 0 8px;
            width: auto;
            background: #111;
            color: #fff;
        }

        .search-header button {
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: #111;
            color: #aaa;
            border-left: 1px solid #222;
        }

        .search-header button:hover {
            background: #0d0d0d;
        }

        .search-btn.search {
            border-radius: 0;
        }

        .search-btn.clear {
            border-radius: 0 8px 8px 0;
            border-left: 1px solid #222;
        }

        #results {
            flex: 1;
            overflow-y: auto;
            text-align: left;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        .loader {
            height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader::after {
            content: "";
            width: 18px;
            height: 18px;
            border: 3px solid #444;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            opacity: 0;
            transition: opacity 0.2s;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .video {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            align-items: center;
        }

        .video:hover {
            background: #333;
        }

        .video.selected {
            background: #262626;
        }

        .thumb {
            position: relative;
            flex-shrink: 0;
        }

        .thumb img {
            width: 120px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            background: #222;
        }

        .duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            font-size: 11px;
            border-radius: 3px;
        }

        .info {
            font-size: 13px;
            min-width: 0;
            flex: 1;
        }

        .meta {
            color: #aaa;
            font-size: 12px;
        }

        .add-to-playlist {
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #444;
            color: white;
            flex-shrink: 0;
        }

        .add-to-playlist:hover {
            background: #555;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            width: min(340px, calc(100vw - 32px));
            box-sizing: border-box;
            text-align: left;
        }

        .modal-content h3 {
            margin-top: 0;
        }

        #modalPlaylists {
            display: grid;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        #modalPlaylists button,
        .modal-content > button,
        .modal-content #createPlaylistBtn {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: #333;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        #modalPlaylists button:hover,
        .modal-content > button:hover,
        .modal-content #createPlaylistBtn:hover {
            background: #444;
        }

        .modal-content input {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .empty-state {
            padding: 14px;
            color: #aaa;
            font-size: 14px;
        }

        .mirror-vertical {
            transform: scale(-1, 1);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }


        .utility-box {
            margin: 0 10px 12px 10px;
        }

        .utility-bar {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            min-height: 54px;
            border: 1px solid #242424;
        }

        .utility-bar input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            padding: 0 14px;
            font-size: clamp(0.92rem, 0.8vw, 1rem);
        }

        .search-btn.utility-settings {
            margin-left: 10px;
            border: none;
            min-width: 64px;
            aspect-ratio: 1/1;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 18px;
        }

        .lastfm-box {
            margin-bottom: 12px;
            display: flex;
            flex-direction: row;
        }

        .utility-bar.lastfm-bar {
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 12px 12px 14px;
            min-height: 0;
            background: linear-gradient(180deg, #1b1b1b 0%, #161616 100%);
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            width: 100%;
        }

        .lastfm-status-area {
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .lastfm-label {
            color: #8f8f8f;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .lastfm-status {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        .lastfm-nowplaying {
            color: #b2b2b2;
            font-size: 12px;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lastfm-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
        }

        .lastfm-actions .search-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid #2f2f2f;
            background: #242424;
            color: #fff;
            transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .lastfm-actions .search-btn:hover {
            background: #313131;
            transform: translateY(-1px);
        }

        .lastfm-actions .lastfm-toggle.active {
            background: #24382a;
            border-color: #345240;
            color: #dfffe6;
        }

        .modal-content.settings-content {
            gap: 10px;
        }

        .settings-grid {
            display: grid;
            gap: 12px;
        }

        .settings-field {
            display: grid;
            gap: 6px;
        }

        .settings-field label {
            font-size: 12px;
            color: #a9a9a9;
            font-weight: 700;
        }

        .settings-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #2b2b2b;
            border-radius: 10px;
            background: #121212;
            color: #fff;
            outline: none;
        }

        .settings-field input:focus {
            border-color: #4b4b4b;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #242424;
            background: #151515;
        }

        .settings-row small {
            color: #9d9d9d;
        }

        .settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .settings-actions .search-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid #2f2f2f;
            background: #242424;
            color: #fff;
        }

        .settings-actions .search-btn:hover {
            background: #313131;
        }

        .playlist-actions {
            display: flex;
            gap: 0;
            flex-shrink: 0;
        }

        .playlist-actions .action-left {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .playlist-actions .action-right {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-left: 1px solid #1d1d1d;
        }

        .playlist-actions .action-single {
            border-radius: 8px;
        }

        .playlist-actions .playlist-save-btn,
        .playlist-actions .delete-playlist-btn {
            min-width: 46px;
            padding: 10px 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .playlist-actions .playlist-save-btn {
            background: #3a3a3a;
        }

        .playlist-actions .playlist-save-btn:hover {
            background: #4a4a4a;
        }

        .playlist-actions .delete-playlist-btn:hover {
            background: #443333;
        }

        .video.dragging {
            opacity: 0.5;
        }

        .middle .video,
        .playlist-row {
            cursor: grab;
        }

        .middle .video:active,
        .playlist-row:active {
            cursor: grabbing;
        }

        .playlist-drop-placeholder {
            height: 12px;
            margin: 0 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
        }

        .playlist-drop-placeholder::after {
            content: "";
            display: block;
            height: 100%;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.35);
        }

        @media (max-width: 1600px) {
            .left { flex-basis: 18.5vw; }
            .middle { flex-basis: 40.75vw; }
            .right { flex-basis: 40.75vw; }
        }

        @media (max-width: 1320px) {
            .app { min-width: 1180px; }
            #playbackControl,
            .playlist-list,
            .search-box,
            .lyrics-box,
            .utility-box {
                margin-left: 8px;
                margin-right: 8px;
            }
            .title { font-size: 0.98rem; }
            .author, .meta, .control-timebar div, .volume-row div, .lyrics-subtitle, .empty-state { font-size: 0.84rem; }
            .control-buttons button { font-size: 1rem; }
        }

        @media (max-width: 1080px) {
            .app {
                min-width: 0;
                overflow-x: auto;
            }
            .left { flex-basis: 290px; }
            .middle { flex-basis: 420px; }
            .right { flex-basis: 420px; }
        }

    </style>
</head>
<body>
    <div class="app">
        <div class="left">
            <div id="playbackControl">
                <div class="album-art-container" id="albumArtWrap">
                    <img class="thumb-fg" id="albumArt" src="" alt="">
                    <div class="album-loading-overlay" id="albumLoadingOverlay" aria-hidden="true">
                        <div class="mini-spinner"></div>
                    </div>
                </div>

                <div id="player"></div>

                <div class="title" id="playbackTitle">TITLE</div>
                <div class="author" id="playbackAuthor">AUTHOR</div>

                <div class="control-timebar">
                    <div id="currentTimeLabel">00:00</div>
                    <input type="range" id="seekControl" min="0" max="100" value="0">
                    <div id="durationLabel">00:00</div>
                </div>

                <div class="control-buttons">
                    <button type="button" onclick="toggleShuffle()" title="Shuffle" class="bx bx-shuffle"></button>

                        <button type="button" class="search-btn lastfm-toggle bx bx-radio-circle" id="lastfmToggleBtn" onclick="toggleLastFmScrobbling()" title="Toggle scrobbling"></button>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal-content">
            <h3>Add to Playlist</h3>
            <div id="modalPlaylists"></div>
            <input id="newPlaylistName" placeholder="New playlist name">

    <div class="modal" id="settingsModal" aria-hidden="true">
        <div class="modal-content settings-content">
            <h3>Settings</h3>
            <div class="settings-grid">
                <div class="settings-field">
                    <label for="lastfmUsernameInput">Last.fm username</label>
                    <input id="lastfmUsernameInput" type="text" placeholder="Username">
                </div>
                <div class="settings-field">
                    <label for="lastfmPasswordInput">Last.fm password</label>
                    <input id="lastfmPasswordInput" type="password" placeholder="Password">
                </div>

                    <label for="lastfmMinListenInput">Minimum listen time to scrobble (seconds)</label>

                        <div style="font-weight:700;">Disable scrobbling permanently</div>

            <div class="settings-actions">
                <button type="button" class="search-btn bx bx-save" onclick="saveSettings()" title="Save"></button>
                <button type="button" class="search-btn bx bx-x" onclick="closeSettingsModal()" title="Close"></button>
            </div>
        </div>
    </div>

    <script>
        const LRCLIB_API = "https://lrclib.net/api";

        let currentController = null;
        let searchHasResults = false;
        let currentVideo = null;
        let currentPlaylist = null;

        let player = null;
        let playing = false;
        let songUnavailable = false;
        let progressInterval = null;
        let isDragging = false;
        let errorTimeout = null;
        let countdownInterval = null;
        let selectedVideoId = "";
        let actualSelectedVideoId = null;
        let currentVolume = parseInt(localStorage.getItem("volumeLevel"), 10) || 80;
        let repeatSong = false;
        let shuffleEnabled = false;
        let seekUpdateFromPlayer = false;
        let pendingVideo = null;

        let lyricsLoadToken = 0;
        let currentLyricsLines = [];
        let currentLyricsSongId = null;
        let currentLyricsMeta = null;
        let lastHighlightedLyricIndex = -1;
        let lyricsIsLoading = false;
        let albumIsLoading = false;
        let draggedTrackVideoId = null;
        let dragOverTrackVideoId = null;
        let dragInsertPosition = "before";
        let dragDropIndex = null;
        let playlistViewRenderQueued = false;
        const playlistOrderState = {};

        const searchBox = document.getElementById("searchBox");
        const searchInput = document.getElementById("searchInput");
        const resultsDiv = document.getElementById("results");
        const seekControl = document.getElementById("seekControl");
        const volumeControl = document.getElementById("volumeControl");
        const lyricsBox = document.getElementById("lyricsBox");
        const lyricsTitle = document.getElementById("lyricsTitle");
        const lyricsSubtitle = document.getElementById("lyricsSubtitle");
        const lyricsContent = document.getElementById("lyricsContent");
        const albumArtWrap = document.getElementById("albumArtWrap");
        const albumArt = document.getElementById("albumArt");
        const albumLoadingOverlay = document.getElementById("albumLoadingOverlay");
        const lyricsLoadingOverlay = document.getElementById("lyricsLoadingOverlay");
        const settingsModal = document.getElementById("settingsModal");

        if (!localStorage.getItem("db")) {
            saveDB({ playlists: { "Default": [] } });
        }

        searchBox.addEventListener("mouseenter", () => {
            if (searchHasResults && !searchBox.classList.contains("loading")) {
                searchBox.classList.add("open");
            }
        });

        searchBox.addEventListener("mouseleave", () => {
            if (searchHasResults && !searchBox.classList.contains("loading")) {
                searchBox.classList.remove("open");
            }
        });

        searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                search();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });

        function getDB() {
            try {
                const db = JSON.parse(localStorage.getItem("db"));
                return db && typeof db === "object" ? db : { playlists: {} };
            } catch {
                return { playlists: {} };
            }
        }

        function saveDB(db) {
            localStorage.setItem("db", JSON.stringify(db));
        }

        function getPlaybackStateFromDB() {
            const db = getDB();
            const state = db && typeof db.playerState === "object" ? db.playerState : {};
            return {
                repeatSong: !!state.repeatSong,
                shuffleEnabled: !!state.shuffleEnabled
            };
        }

        function savePlaybackStateToDB() {
            const db = getDB();
            db.playerState = {
                repeatSong: !!repeatSong,
                shuffleEnabled: !!shuffleEnabled
            };
            saveDB(db);
        }

        function sanitizeTrackForDB(track) {
            if (!track || typeof track !== "object") return null;
            return {
                videoId: String(track.videoId || ""),
                songName: getTrackTitle(track),
                authorName: getTrackArtist(track),
                albumArt: getTrackCover(track),
                duration: Math.max(1, Number(track.duration) || 0)
            };
        }

        function getLastPlayedTrackFromDB() {
            const db = getDB();
            return db && db.lastPlayedTrack && typeof db.lastPlayedTrack === "object"
                ? db.lastPlayedTrack
                : null;
        }

        function saveLastPlayedTrack(track, { forceCache = true } = {}) {
            const db = getDB();
            db.lastPlayedTrack = sanitizeTrackForDB(track);
            saveDB(db);
            if (forceCache) {
                lastfmSavedLastPlayedTrack = db.lastPlayedTrack;
            }
        }

        function normalizeLastFmRecentTrack(item) {
            const artist = typeof item?.artist === "string" ? item.artist : item?.artist?.["#text"] || "";
            const name = String(item?.name || "").trim();
            if (!artist && !name) return null;
            return {
                videoId: `lastfm:${normalizeText(artist)}:${normalizeText(name)}`,
                songName: name || "Unknown",
                authorName: artist || "Unknown",
                title: name || "Unknown",
                author: artist || "Unknown",
                albumArt: "",
                duration: Math.max(1, Number(item?.duration) || 0),
                source: "lastfm"
            };
        }

        function formatDuration(seconds) {
            const sec = Number.parseInt(seconds, 10);
            if (!Number.isFinite(sec) || sec < 0) return "0:00";
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            const mm = String(m).padStart(2, "0");
            const ss = String(s).padStart(2, "0");
            return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
        }

        function normalizeText(value) {
            return String(value || "")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, " ")
                .trim();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function nextPaint() {
            return new Promise((resolve) => requestAnimationFrame(() => resolve()));
        }

        function pickThumbnail(video, preferredQualities = ["high", "medium", "default", "maxres", "maxresdefault", "sddefault"]) {
            const thumbs = Array.isArray(video?.videoThumbnails) ? video.videoThumbnails : [];
            for (const q of preferredQualities) {
                const found = thumbs.find(t => t && t.quality === q && t.url);
                if (found) return found.url;
            }
            return thumbs.find(t => t && t.url)?.url || "";
        }

        function normalizeVideo(video) {
            const coverurl = pickThumbnail(video, ["maxres", "maxresdefault", "sddefault", "high", "medium", "default"]);
            const thumb = pickThumbnail(video, ["default", "medium", "high", "sddefault", "maxresdefault"]);
            const songName = video.title || "Untitled";
            const authorName = video.author || "Unknown";
            const albumArt = thumb || coverurl;

            return {
                videoId: video.videoId,
                songName,
                authorName,
                albumArt,
                title: songName,
                author: authorName,
                coverurl,
                thumbnailUrl: albumArt,
                duration: Number(video.lengthSeconds) || 0,
                viewCountText: video.viewCountText || "",
                publishedText: video.publishedText || ""
            };
        }

        function getTrackThumb(track) {
            return track?.albumArt || track?.thumbnailUrl || track?.coverurl || "";
        }

        function getTrackCover(track) {
            return track?.coverurl || track?.albumArt || track?.thumbnailUrl || "";
        }

        function getTrackTitle(track) {
            return track?.songName || track?.title || "Untitled";
        }

        function getTrackArtist(track) {
            return track?.authorName || track?.author || "Unknown";
        }

        function setControlButtonActive(button, active) {
            if (!button) return;
            button.classList.toggle("active-toggle", !!active);
        }

        function syncToggleButtons() {
            const shuffleBtn = document.querySelector('.control-buttons button[onclick="toggleShuffle()"]');
            const repeatBtn = document.querySelector('.control-buttons button[onclick="toggleRepeat()"]');
            setControlButtonActive(shuffleBtn, shuffleEnabled);
            setControlButtonActive(repeatBtn, repeatSong);
        }

        function setAlbumLoading(isLoading) {
            albumIsLoading = !!isLoading;
            if (albumArtWrap) albumArtWrap.classList.toggle("loading", albumIsLoading);
            if (albumLoadingOverlay) albumLoadingOverlay.setAttribute("aria-hidden", albumIsLoading ? "false" : "true");
        }

        function setLyricsLoading(isLoading) {
            lyricsIsLoading = !!isLoading;
            if (lyricsBox) lyricsBox.classList.toggle("loading", lyricsIsLoading);
            if (lyricsLoadingOverlay) lyricsLoadingOverlay.setAttribute("aria-hidden", lyricsIsLoading ? "false" : "true");
        }

        function arraysEqualById(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i += 1) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        function getSavedPlaylistTracks(name) {
            const db = getDB();
            return Array.isArray(db.playlists?.[name]) ? db.playlists[name] : [];
        }

        function getPlaylistState(name) {
            const tracks = getSavedPlaylistTracks(name);
            let state = playlistOrderState[name];
            if (!state) {
                state = playlistOrderState[name] = {
                    order: tracks.map(track => track.videoId),
                    dirty: false,
                    source: "db"
                };
            }

            const dbIds = tracks.map(track => track.videoId);
            const seen = new Set();
            state.order = state.order.filter((id) => {
                if (!dbIds.includes(id) || seen.has(id)) return false;
                seen.add(id);
                return true;
            });
            for (const track of tracks) {
                if (!state.order.includes(track.videoId)) state.order.push(track.videoId);
            }
            if (!state.order.length && tracks.length) {
                state.order = tracks.map(track => track.videoId);
            }
            if (!state.source) state.source = "db";
            return state;
        }

        function getPlaylistTracksInWorkingOrder(name = currentPlaylist) {
            const tracks = getSavedPlaylistTracks(name);
            const map = new Map(tracks.map(track => [track.videoId, track]));
            const state = getPlaylistState(name);
            return state.order.map((id) => map.get(id)).filter(Boolean);
        }

        function setPlaylistWorkingOrder(name, orderedTracks, source = "manual") {
            const state = getPlaylistState(name);
            state.order = orderedTracks.map(track => track.videoId);
            state.dirty = true;
            state.source = source;
        }

        function savePlaylistOrder(name = currentPlaylist) {
            if (!name) return;
            const db = getDB();
            if (!db.playlists[name]) return;
            const orderedTracks = getPlaylistTracksInWorkingOrder(name);
            db.playlists[name] = orderedTracks;
            saveDB(db);
            const state = getPlaylistState(name);
            state.dirty = false;
            resetPlaylistDragState();
            renderPlaylists();
            renderPlaylistView();
        }

        function setPlaylistToDbOrder(name) {
            const dbTracks = getSavedPlaylistTracks(name);
            const state = getPlaylistState(name);
            state.order = dbTracks.map(track => track.videoId);
            state.dirty = false;
            state.source = "db";
        }

        function resetPlaylistDragState() {
            draggedTrackVideoId = null;
            dragOverTrackVideoId = null;
            dragInsertPosition = "before";
            dragDropIndex = null;
            playlistViewRenderQueued = false;
        }

        function schedulePlaylistViewRender() {
            if (playlistViewRenderQueued) return;
            playlistViewRenderQueued = true;
            requestAnimationFrame(() => {
                playlistViewRenderQueued = false;
                renderPlaylistView();
            });
        }

        function shuffleArray(items) {
            const arr = items.slice();
            for (let i = arr.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function syncControlToggleState() {
            syncToggleButtons();
        }

        function setCurrentPlayingIndicatorsLoading(show) {
            setAlbumLoading(show);
        }

        function clearSearch() {
            if (currentController) {
                currentController.abort();
                currentController = null;
            }

            searchInput.value = "";
            resultsDiv.innerHTML = "";
            searchHasResults = false;
            searchBox.classList.remove("open", "loading");
        }

        async function search() {
            if (currentController) currentController.abort();

            const query = searchInput.value.trim();
            if (!query) {
                clearSearch();
                return;
            }

            resultsDiv.innerHTML = "";
            searchHasResults = false;
            searchBox.classList.remove("open");
            searchBox.classList.add("loading");

            currentController = new AbortController();
            const { signal } = currentController;

            await nextPaint();

            try {
                const res = await fetch(
                    `https://inv.thepixora.com/api/v1/search?q=${encodeURIComponent(query)}&type=video`,
                    { signal }
                );

                if (!res.ok) {
                    throw new Error(`Search failed: ${res.status}`);
                }

                const videos = await res.json();

                if (!Array.isArray(videos) || videos.length === 0) {
                    resultsDiv.innerHTML = `<div class="empty-state">No results found.</div>`;
                    searchHasResults = false;
                    searchBox.classList.add("open");
                    return;
                }

                const normalizedVideos = videos.map(normalizeVideo);
                searchHasResults = true;

                normalizedVideos.forEach((vObj) => {
                    const duration = formatDuration(vObj.duration);

                    const el = document.createElement("div");
                    el.className = "video";

                    const thumbWrap = document.createElement("div");
                    thumbWrap.className = "thumb";

                    const img = document.createElement("img");
                    img.src = vObj.thumbnailUrl;
                    img.alt = vObj.songName;
                    img.loading = "lazy";

                    const dur = document.createElement("span");
                    dur.className = "duration";
                    dur.textContent = duration;

                    thumbWrap.appendChild(img);
                    thumbWrap.appendChild(dur);

                    const info = document.createElement("div");
                    info.className = "info";

                    const title = document.createElement("div");
                    title.className = "title";
                    title.textContent = vObj.songName;

                    const meta1 = document.createElement("div");
                    meta1.className = "meta";
                    meta1.textContent = vObj.authorName;

                    const meta2 = document.createElement("div");
                    meta2.className = "meta";
                    meta2.textContent = `${vObj.viewCountText}${vObj.viewCountText && vObj.publishedText ? " • " : ""}${vObj.publishedText}`.trim();

                    info.appendChild(title);
                    info.appendChild(meta1);
                    if (vObj.viewCountText || vObj.publishedText) info.appendChild(meta2);

                    const addBtn = document.createElement("button");
                    addBtn.className = "add-to-playlist";
                    addBtn.textContent = "+";
                    addBtn.title = "Add to playlist";
                    addBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        openModal(vObj);
                    });

                    const play = () => playTrack(vObj);
                    thumbWrap.addEventListener("click", play);
                    info.addEventListener("click", play);

                    el.appendChild(thumbWrap);
                    el.appendChild(info);
                    el.appendChild(addBtn);
                    resultsDiv.appendChild(el);
                });

                searchBox.classList.add("open");
            } catch (error) {
                if (error.name !== "AbortError") {
                    console.error(error);
                    resultsDiv.innerHTML = `<div class="empty-state">Search failed. Please try again.</div>`;
                    searchHasResults = false;
                    searchBox.classList.add("open");
                }
            } finally {
                searchBox.classList.remove("loading");
                currentController = null;
            }
        }

        function getLyricsLinesFromText(text) {
            const normalized = String(text || "").replace(/\r\n/g, "\n").trim();
            if (!normalized) return null;
            return [{ time: 0, text: normalized }];
        }

        function parseSyncedLyrics(rawLyrics) {
            const raw = String(rawLyrics || "").replace(/\r\n/g, "\n").trim();
            if (!raw) return null;

            const lines = [];
            const rows = raw.split("\n");

            for (const row of rows) {
                const timestampMatches = [...row.matchAll(/\[(\d+):(\d{2})(?:\.(\d{1,3}))?\]/g)];
                const text = row.replace(/\[(\d+):(\d{2})(?:\.(\d{1,3}))?\]/g, "").trim();

                if (!timestampMatches.length) {
                    continue;
                }

                for (const match of timestampMatches) {
                    const minutes = Number(match[1]) || 0;
                    const seconds = Number(match[2]) || 0;
                    const fraction = match[3] ? Number(String(match[3]).padEnd(3, "0")) : 0;
                    const time = (minutes * 60) + seconds + (fraction / 1000);
                    lines.push({ time, text });
                }
            }

            lines.sort((a, b) => a.time - b.time);

            return lines.length ? lines : null;
        }

        function plainFromSyncedLines(lines) {
            if (!Array.isArray(lines) || !lines.length) return "";
            return lines.map(line => line?.text || "").join("\n").trim();
        }

        function buildLyricsPayloadFromRecord(record) {
            if (!record || typeof record !== "object") return null;

            const synced = parseSyncedLyrics(record.syncedLyrics);
            if (synced && synced.length) {
                return {
                    source: "lrclib",
                    synced: true,
                    lines: synced
                };
            }

            const plain = record.plainLyrics || record.lyrics || "";
            const forced = getLyricsLinesFromText(plain);
            if (forced && forced.length) {
                return {
                    source: "lrclib",
                    synced: true,
                    lines: forced
                };
            }

            return null;
        }

        function scoreLyricsCandidate(candidate, title, artist, durationMs) {
            const candidateTitle = normalizeText(candidate?.trackName || candidate?.track_name || candidate?.title);
            const candidateArtist = normalizeText(candidate?.artistName || candidate?.artist_name || candidate?.artist);
            const targetTitle = normalizeText(title);
            const targetArtist = normalizeText(artist);

            let score = 0;

            if (candidateTitle === targetTitle) score += 60;
            else if (candidateTitle.includes(targetTitle) || targetTitle.includes(candidateTitle)) score += 35;

            if (targetArtist) {
                if (candidateArtist === targetArtist) score += 45;
                else if (candidateArtist.includes(targetArtist) || targetArtist.includes(candidateArtist)) score += 25;
            }

            const candidateDuration = Number(candidate?.duration) || 0;
            if (durationMs > 0 && candidateDuration > 0) {
                const diff = Math.abs(candidateDuration - durationMs);
                if (diff <= 1) score += 35;
                else if (diff <= 2) score += 25;
                else if (diff <= 5) score += 15;
                else if (diff <= 15) score += 5;
                score -= Math.min(diff / 1000, 20);
            }

            if (candidate?.syncedLyrics) score += 10;
            if (candidate?.plainLyrics) score += 3;

            return score;
        }

        function pickBestLyricsCandidate(results, title, artist, durationMs) {
            if (!Array.isArray(results) || !results.length) return null;

            let best = null;
            let bestScore = -Infinity;

            for (const candidate of results) {
                if (!candidate || (candidate.syncedLyrics == null && candidate.plainLyrics == null)) continue;
                const score = scoreLyricsCandidate(candidate, title, artist, durationMs);
                if (score > bestScore) {
                    bestScore = score;
                    best = candidate;
                }
            }

            return best;
        }

        async function fetchJson(url, signal) {
            const res = await fetch(url, { signal });
            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }
            return res.json();
        }

        async function fetchLyricsRecord(track, signal) {
            const title = getTrackTitle(track);
            const artist = getTrackArtist(track);
            const durationSeconds = Math.max(0, Math.round(Number(track?.duration) || 0));

            const queries = [
                `${LRCLIB_API}/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}&duration=${encodeURIComponent(durationSeconds)}`,
                `${LRCLIB_API}/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`,
                `${LRCLIB_API}/search?q=${encodeURIComponent(`${title} ${artist}`.trim())}`,
                `${LRCLIB_API}/search?q=${encodeURIComponent(title)}`
            ];

            for (const url of queries) {
                try {
                    const data = await fetchJson(url, signal);

                    if (Array.isArray(data)) {
                        const best = pickBestLyricsCandidate(data, title, artist, durationSeconds);
                        if (best) return best;
                    } else if (data && typeof data === "object") {
                        if (data.syncedLyrics || data.plainLyrics) return data;
                    }
                } catch (err) {
                    continue;
                }
            }

            return null;
        }

        function makeStoredLyrics(track, record) {
            const payload = buildLyricsPayloadFromRecord(record);
            if (!payload) return null;

            return {
                source: payload.source,
                synced: true,
                lines: payload.lines.map(line => ({
                    time: Number(line.time) || 0,
                    text: String(line.text || "")
                }))
            };
        }

        function updateTrackInAllPlaylists(videoId, updater) {
            const db = getDB();
            let changed = false;

            for (const playlistName of Object.keys(db.playlists || {})) {
                const playlist = Array.isArray(db.playlists[playlistName]) ? db.playlists[playlistName] : [];
                db.playlists[playlistName] = playlist.map((track) => {
                    if (!track || track.videoId !== videoId) return track;
                    changed = true;
                    return updater({ ...track });
                });
            }

            if (changed) saveDB(db);
            return changed;
        }

        function updateCurrentLyricsFromTrack(track) {
            currentLyricsSongId = track?.videoId || null;
            currentLyricsMeta = track || null;
            currentLyricsLines = Array.isArray(track?.lyrics?.lines) ? track.lyrics.lines.slice().sort((a, b) => a.time - b.time) : [];
            lastHighlightedLyricIndex = -1;
            renderLyricsPanel();
        }

        
        function renderLyricsPanel() {
            const title = getTrackTitle(currentLyricsMeta);
            const artist = getTrackArtist(currentLyricsMeta);

            lyricsTitle.textContent = "Lyrics";
            lyricsSubtitle.textContent = currentLyricsMeta ? `${title} • ${artist}` : "Nothing playing";
            lyricsContent.innerHTML = "";

            if (!currentLyricsMeta) {
                const empty = document.createElement("div");
                empty.className = "lyrics-empty";
                empty.textContent = "Play a song to view lyrics.";
                lyricsContent.appendChild(empty);
                setLyricsLoading(false);
                return;
            }

            if (lyricsIsLoading) {
                const loading = document.createElement("div");
                loading.className = "lyrics-empty";
                loading.textContent = "Loading lyrics…";
                lyricsContent.appendChild(loading);
            }

            if (!currentLyricsLines.length && !lyricsIsLoading) {
                const empty = document.createElement("div");
                empty.className = "lyrics-empty";
                empty.textContent = "No lyrics found for this track.";
                lyricsContent.appendChild(empty);
                return;
            }

            currentLyricsLines.forEach((line, index) => {
                const div = document.createElement("div");
                div.className = "lyrics-line";
                div.dataset.index = String(index);
                div.dataset.time = String(Number(line.time) || 0);
                div.textContent = line.text || " ";
                div.addEventListener("click", () => seekToTime(Number(line.time) || 0));
                lyricsContent.appendChild(div);
            });
        }

        function seekToTime(timeInSeconds) {
            if (!player || typeof player.seekTo !== "function") return;
            const time = Math.max(0, Number(timeInSeconds) || 0);
            player.seekTo(time, true);
            document.getElementById("currentTimeLabel").innerText = formatTime(time);
            const duration = player.getDuration ? player.getDuration() : 0;
            if (duration > 0) {
                seekUpdateFromPlayer = true;
                seekControl.value = String(Math.max(0, Math.min(100, (time / duration) * 100)));
                seekUpdateFromPlayer = false;
            }
            highlightLyricsAtTime(time);
        }

        function highlightLyricsAtTime(currentTime) {
            if (!currentLyricsLines.length) return;

            let activeIndex = 0;
            for (let i = 0; i < currentLyricsLines.length; i += 1) {
                if (currentTime >= (Number(currentLyricsLines[i].time) || 0)) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex === lastHighlightedLyricIndex) return;
            lastHighlightedLyricIndex = activeIndex;

            const nodes = lyricsContent.querySelectorAll(".lyrics-line");
            nodes.forEach((node, index) => {
                node.classList.toggle("active", index === activeIndex);
            });

            const activeNode = lyricsContent.querySelector(`.lyrics-line[data-index="${activeIndex}"]`);
            if (activeNode) {
                activeNode.scrollIntoView({ block: "center", behavior: "smooth" });
            }
        }

        async function ensureLyricsForTrack(track, { persist = false } = {}) {
            if (!track || !track.videoId) return track || null;

            if (track.lyrics?.lines?.length) {
                const normalized = {
                    ...track,
                    lyrics: {
                        source: track.lyrics.source || "lrclib",
                        synced: true,
                        lines: track.lyrics.lines.map(line => ({
                            time: Number(line.time) || 0,
                            text: String(line.text || "")
                        }))
                    }
                };

                if (persist) {
                    updateTrackInAllPlaylists(track.videoId, () => normalized);
                }

                return normalized;
            }

            const token = ++lyricsLoadToken;
            const controller = new AbortController();

            let record = null;
            try {
                record = await fetchLyricsRecord(track, controller.signal);
            } catch {
                record = null;
            }

            if (token !== lyricsLoadToken) {
                return track;
            }

            if (!record) return track;

            const lyrics = makeStoredLyrics(track, record);
            if (!lyrics) return track;

            const enriched = {
                ...track,
                lyrics
            };

            if (persist) {
                updateTrackInAllPlaylists(track.videoId, () => enriched);
            }

            return enriched;
        }

        function renderPlaylistView() {
            const db = getDB();
            const view = document.getElementById("playlistView");
            view.innerHTML = "";

            const names = Object.keys(db.playlists);
            if (!names.length) {
                view.innerHTML = `<div class="empty-state">Create a playlist to get started.</div>`;
                return;
            }

            if (!currentPlaylist || !db.playlists[currentPlaylist]) {
                currentPlaylist = names[0];
            }

            const orderedTracks = getPlaylistTracksInWorkingOrder(currentPlaylist);
            const dropIndex = draggedTrackVideoId === null ? null : (dragDropIndex ?? orderedTracks.length);

            if (!orderedTracks.length) {
                view.innerHTML = `<div class="empty-state">"${currentPlaylist}" is empty.</div>`;
                return;
            }

            view.ondragover = onPlaylistViewDragOver;
            view.ondrop = onPlaylistViewDrop;

            function appendDropPlaceholder(parent) {
                const placeholder = document.createElement("div");
                placeholder.className = "playlist-drop-placeholder";
                parent.appendChild(placeholder);
            }

            orderedTracks.forEach((v, index) => {
                if (dropIndex !== null && dropIndex === index) {
                    appendDropPlaceholder(view);
                }

                const row = document.createElement("div");
                row.className = "video";
                row.setAttribute("data-video", v.videoId);
                row.draggable = true;

                if (v.videoId === actualSelectedVideoId || v.videoId === selectedVideoId) {
                    row.classList.add("selected");
                }
                if (draggedTrackVideoId === v.videoId) {
                    row.classList.add("dragging");
                }

                const cover = makeSquareThumb(getTrackThumb(v), v.songName || "Track cover");
                cover.title = "Play track";
                cover.onclick = () => playTrack(v);

                const info = document.createElement("div");
                info.className = "info";

                const title = document.createElement("div");
                title.className = "title";
                title.textContent = v.songName || "Untitled";

                const author = document.createElement("div");
                author.className = "meta";
                author.textContent = v.authorName || "Unknown";

                const duration = document.createElement("div");
                duration.className = "meta";
                duration.textContent = formatDuration(v.duration || 0);

                info.appendChild(title);
                info.appendChild(author);
                info.appendChild(duration);

                const actions = document.createElement("div");
                actions.className = "playlist-actions";

                const dragBtn = document.createElement("button");
                dragBtn.className = "drag-handle action-left";
                dragBtn.type = "button";
                dragBtn.title = "Drag to reorder";
                dragBtn.innerHTML = '<i class="bi bi-grip-vertical"></i>';
                dragBtn.draggable = false;
                dragBtn.addEventListener("click", (e) => e.preventDefault());

                const removeBtn = document.createElement("button");
                removeBtn.className = "delete-track-btn action-right";
                removeBtn.type = "button";
                removeBtn.innerHTML = '<i class="bi bi-trash"></i>';
                removeBtn.title = "Delete from playlist";
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeFromPlaylist(v.videoId);
                };

                actions.appendChild(dragBtn);
                actions.appendChild(removeBtn);

                row.appendChild(cover);
                row.appendChild(info);
                row.appendChild(actions);

                row.addEventListener("dragstart", (e) => {
                    if (e.target.closest(".delete-track-btn") || e.target.closest(".track-cover-btn")) {
                        e.preventDefault();
                        return;
                    }
                    draggedTrackVideoId = v.videoId;
                    dragDropIndex = index;
                    e.dataTransfer.effectAllowed = "move";
                    e.dataTransfer.setData("text/plain", v.videoId);
                    e.dataTransfer.setDragImage(row, row.clientWidth / 2, row.clientHeight / 2);
                    schedulePlaylistViewRender();
                });

                row.addEventListener("dragover", (e) => {
                    if (!draggedTrackVideoId || draggedTrackVideoId === v.videoId) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "move";
                    const nextDropIndex = e.offsetY < (row.offsetHeight / 2) ? index : index + 1;
                    if (dragDropIndex !== nextDropIndex) {
                        dragDropIndex = nextDropIndex;
                        schedulePlaylistViewRender();
                    }
                });

                row.addEventListener("drop", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!draggedTrackVideoId) return;
                    const state = getPlaylistState(currentPlaylist);
                    const ids = state.order.slice();
                    const from = ids.indexOf(draggedTrackVideoId);
                    let insertAt = dragDropIndex;
                    if (insertAt === null || insertAt === undefined) insertAt = ids.length;
                    if (from < 0) return;
                    ids.splice(from, 1);
                    if (from < insertAt) insertAt -= 1;
                    insertAt = Math.max(0, Math.min(insertAt, ids.length));
                    ids.splice(insertAt, 0, draggedTrackVideoId);
                    state.order = ids;
                    state.dirty = true;
                    state.source = "manual";
                    resetPlaylistDragState();
                    renderPlaylists();
                    renderPlaylistView();
                });

                row.addEventListener("dragend", () => {
                    resetPlaylistDragState();
                    renderPlaylistView();
                });

                row.onclick = (e) => {
                    if (e.target.closest(".delete-track-btn") || e.target.closest(".track-cover-btn") || e.target.closest(".drag-handle")) return;
                    playTrack(v);
                };

                view.appendChild(row);
            });

            if (dropIndex !== null && dropIndex === orderedTracks.length) {
                appendDropPlaceholder(view);
            }
        }

        function onPlaylistViewDragOver(e) {
            if (!draggedTrackVideoId) return;
            e.preventDefault();
            const view = document.getElementById("playlistView");
            if (!view) return;
            const rows = Array.from(view.querySelectorAll('.video[data-video]'));
            if (!rows.length) {
                if (dragDropIndex !== 0) {
                    dragDropIndex = 0;
                    schedulePlaylistViewRender();
                }
                return;
            }
            const lastRow = rows[rows.length - 1];
            const rect = lastRow.getBoundingClientRect();
            if (e.clientY > rect.bottom) {
                if (dragDropIndex !== rows.length) {
                    dragDropIndex = rows.length;
                    schedulePlaylistViewRender();
                }
            }
        }

        function onPlaylistViewDrop(e) {
            if (!draggedTrackVideoId || e.target !== e.currentTarget) return;
            e.preventDefault();
            const state = getPlaylistState(currentPlaylist);
            const ids = state.order.slice();
            const from = ids.indexOf(draggedTrackVideoId);
            let insertAt = dragDropIndex;
            if (insertAt === null || insertAt === undefined) insertAt = ids.length;
            if (from < 0) return;
            ids.splice(from, 1);
            if (from < insertAt) insertAt -= 1;
            insertAt = Math.max(0, Math.min(insertAt, ids.length));
            ids.splice(insertAt, 0, draggedTrackVideoId);
            state.order = ids;
            state.dirty = true;
            state.source = "manual";
            resetPlaylistDragState();
            renderPlaylists();
            renderPlaylistView();
        }

        async function addToPlaylist(name) {
            if (!currentVideo) return;

            const db = getDB();
            if (!db.playlists[name]) db.playlists[name] = [];

            const trackToStore = {
                ...currentVideo,
                lyrics: currentVideo.lyrics?.lines?.length
                    ? currentVideo.lyrics
                    : null
            };

            const existsIndex = db.playlists[name].findIndex(v => v.videoId === currentVideo.videoId);

            if (existsIndex >= 0) {
                db.playlists[name][existsIndex] = {
                    ...db.playlists[name][existsIndex],
                    ...trackToStore
                };
            } else {
                db.playlists[name].push(trackToStore);
            }

            saveDB(db);

            currentPlaylist = name;
            closeModal();
            renderPlaylists();
            renderPlaylistView();

            void primeLyricsForTrack(trackToStore);
        }

        async function primeLyricsForTrack(track) {
            if (!track || !track.videoId) return;

            const controller = new AbortController();
            let record = null;
            try {
                record = await fetchLyricsRecord(track, controller.signal);
            } catch {
                record = null;
            }

            if (!record) return;

            const lyrics = makeStoredLyrics(track, record);
            if (!lyrics) return;

            const enriched = {
                ...track,
                lyrics
            };

            updateTrackInAllPlaylists(track.videoId, () => enriched);
            renderPlaylists();
            renderPlaylistView();

            if (currentLyricsSongId === enriched.videoId || actualSelectedVideoId === enriched.videoId || selectedVideoId === enriched.videoId) {
                currentLyricsMeta = enriched;
                currentLyricsLines = Array.isArray(enriched.lyrics?.lines) ? enriched.lyrics.lines.slice().sort((a, b) => a.time - b.time) : [];
                setLyricsLoading(false);
                renderLyricsPanel();
            }
        }

                source: "db"

        function deletePlaylist(name) {
            const db = getDB();
            if (!db.playlists[name]) return;

            if (!confirm(`Delete playlist "${name}"? This cannot be undone.`)) return;

            delete db.playlists[name];
            delete playlistOrderState[name];
            saveDB(db);

            const names = Object.keys(db.playlists);
            currentPlaylist = names[0] || null;

            renderPlaylists();
            renderPlaylistView();
        }

        function removeFromPlaylist(videoId) {
            const db = getDB();
            if (!currentPlaylist || !db.playlists[currentPlaylist]) return;

            const track = db.playlists[currentPlaylist].find(v => v.videoId === videoId);
            const title = getTrackTitle(track);

            if (!confirm(`Remove "${title}" from "${currentPlaylist}"?`)) return;

            db.playlists[currentPlaylist] = db.playlists[currentPlaylist].filter(v => v.videoId !== videoId);
            const state = playlistOrderState[currentPlaylist];
            if (state) {
                state.order = state.order.filter(id => id !== videoId);
                state.dirty = state.source !== "db" || !arraysEqualById(state.order, db.playlists[currentPlaylist].map(v => v.videoId));
            }
            saveDB(db);

            if (actualSelectedVideoId === videoId) {
                actualSelectedVideoId = null;
            }

            renderPlaylists();
            renderPlaylistView();
        }

            const db = getDB();

                        if (selectedVideoId) {
                            event.target.cueVideoById(selectedVideoId);

                        if (pendingVideo) {
                            const { videoId, albumArtUrl, songObject } = pendingVideo;
                            pendingVideo = null;
                            loadNewVideo(videoId, albumArtUrl, songObject);
                        }

                    onStateChange: handlePlayerStateChange,

                }

        function setPlayPauseIcon(isPlaying) {
            const playPauseBtn = document.getElementById("playPauseBtn");
            if (!playPauseBtn) return;

            playPauseBtn.classList.remove("bx-play", "bx-pause");
            playPauseBtn.classList.add(isPlaying ? "bx-pause" : "bx-play");
        }

        function handlePlayerStateChange(event) {
            if (event.data === YT.PlayerState.BUFFERING) {
                setAlbumLoading(true);
            } else if (event.data === YT.PlayerState.PLAYING) {
                playing = true;
                songUnavailable = false;
                setAlbumLoading(false);
                setPlayPauseIcon(true);
                handleLastFmPlaybackStarted();
                updateProgressBar();
            } else if (event.data === YT.PlayerState.PAUSED) {
                playing = false;
                setAlbumLoading(false);
                setPlayPauseIcon(false);
                handleLastFmPlaybackPaused();
                clearInterval(progressInterval);
            } else if (event.data === YT.PlayerState.ENDED) {
                playing = false;
                clearInterval(progressInterval);
                setAlbumLoading(false);
                setPlayPauseIcon(false);
                handleLastFmPlaybackEnded();

                if (repeatSong) {
                    player.seekTo(0, true);
                    player.playVideo();
                    return;
                }

                playNextSong();
            }
        }

        function handleVideoError() {
            const errorMsg = document.getElementById("errorMessage");
            playing = false;
            songUnavailable = true;
            clearInterval(progressInterval);

            if (player && typeof player.pauseVideo === "function") {
                player.pauseVideo();
            }

            setPlayPauseIcon(false);

            if (errorMsg) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "This video is unavailable.";
            }
        }

        function resetErrorState() {
            clearInterval(countdownInterval);
            const errorMsg = document.getElementById("errorMessage");
            if (errorMsg) {
                errorMsg.style.display = "none";
                errorMsg.innerHTML = "";
            }
        }

        function removeArtistFromTitle(title, artist) {
            if (!title) return title;

            let cleanedTitle = title.trim();

            if (artist) {
                const pattern = new RegExp(`^${artist}\\s*-?\\s*`, "i");
                cleanedTitle = cleanedTitle.replace(pattern, "").trim();
            }

            if (cleanedTitle.includes("-")) {
                cleanedTitle = cleanedTitle.split("-").slice(1).join("-").trim();
            }

            return cleanedTitle;
        }

        function updateProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (!player || typeof player.getCurrentTime !== "function" || isDragging) return;

                const currentTime = player.getCurrentTime();
                const duration = player.getDuration ? player.getDuration() : 0;
